<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازارچه طراحی چاپ - تخفیف ماهانه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: #f8fafc;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: white;
            padding: 12px 24px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .lang-switch button {
            background: #e2e8f0;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            margin: 0 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .active-lang {
            background: #1e293b !important;
            color: white;
        }
        h1, h2 {
            margin: 0.5rem 0;
        }
        .cart-panel {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .month-info {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .design-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .design-card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .design-card button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            font-weight: bold;
        }
        .design-card button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0f172a;
            margin: 8px 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            padding: 8px 0;
        }
        .total-row {
            font-size: 1.3rem;
            font-weight: bold;
            border-top: 2px solid #cbd5e1;
            padding-top: 12px;
            margin-top: 8px;
        }
        .badge-discount {
            background: #f59e0b;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-block;
            margin: 12px 0;
        }
        button.checkout {
            background: #10b981;
            padding: 12px 24px;
            font-size: 1.1rem;
            margin-top: 16px;
            width: 100%;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #475569;
        }
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 id="siteTitle">🎨 بازارچه طراحی چاپ (فلکسو، لیبل و بسته‌بندی)</h1>
        <div class="lang-switch">
            <button id="langFa" class="active-lang">فارسی</button>
            <button id="langEn">English</button>
        </div>
    </div>

    <!-- پنل سبد خرید ماهانه چاپخانه -->
    <div class="cart-panel" id="cartPanel">
        <h2 id="cartTitle">🛒 سبد خرید این ماه</h2>
        <div id="monthRangeDisplay" class="month-info"></div>
        <div id="cartItemsList">بارگذاری...</div>
        <div id="discountBox" class="badge-discount"></div>
        <div id="totalPriceDisplay" class="total-row"></div>
        <button id="checkoutFinalBtn" class="checkout">✅ ثبت سفارش ماهانه (پرداخت و دریافت فایل‌ها)</button>
        <p id="checkoutNote" style="font-size:12px; margin-top:8px;">* پس از ثبت، سبد این ماه بسته می‌شود و ماه بعد از صفر شروع می‌شود.</p>
    </div>

    <h2 id="designsTitle">📦 طرح‌های موجود برای خرید (مخصوص چاپخانه‌ها)</h2>
    <div id="designsGrid" class="design-grid"></div>
    <footer id="footerText">تخفیف ماهانه: خرید ۴ طرح = ۵۰٪ | ۸ طرح = ۶۰٪ | ۱۰+ طرح = ۷۰٪ — اعتبار فقط برای ماه جاری</footer>
</div>

<script>
    // -------------------- دیتابیس طرح‌ها (قابل ویرایش) --------------------
    const designsDB = [
        { id: 1, nameFa: "طرح فلکسو - گل و برگ", nameEn: "Flexo - Flower & Leaf", typeFa: "فلکسو", typeEn: "Flexo", price: 89000, designer: "طراح A" },
        { id: 2, nameFa: "لیبل تر و تازه", nameEn: "Fresh Label", typeFa: "لیبل", typeEn: "Label", price: 64000, designer: "طراح B" },
        { id: 3, nameFa: "جعبه بسته‌بندی لوکس", nameEn: "Luxury Box", typeFa: "جعبه", typeEn: "Box", price: 135000, designer: "طراح C" },
        { id: 4, nameFa: "کارت ویزیت طلایی", nameEn: "Gold Business Card", typeFa: "کارت ویزیت", typeEn: "Business Card", price: 49000, designer: "طراح D" },
        { id: 5, nameFa: "فلکسو طرح میوه", nameEn: "Fruit Flexo", typeFa: "فلکسو", typeEn: "Flexo", price: 78000, designer: "طراح A" },
        { id: 6, nameFa: "لیبل عسل طبیعی", nameEn: "Honey Label", typeFa: "لیبل", typeEn: "Label", price: 57000, designer: "طراح B" },
        { id: 7, nameFa: "جعبه ادکلن اختصاصی", nameEn: "Perfume Box", typeFa: "جعبه", typeEn: "Box", price: 179000, designer: "طراح C" }
    ];

    // کلیدهای localStorage
    const MONTH_CART_KEY = "monthly_cart_ids";
    const MONTH_START_KEY = "month_start_timestamp";
    const MONTH_ORDERS_HISTORY = "past_months_orders";

    // ---------- توابع کمکی ماه ----------
    function getCurrentMonthStart() {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    }

    // بررسی و ریست خودکار اگر ماه تغییر کرده باشد
    function resetMonthIfNeeded() {
        const savedStart = localStorage.getItem(MONTH_START_KEY);
        const currentStart = getCurrentMonthStart();
        if (!savedStart) {
            localStorage.setItem(MONTH_START_KEY, currentStart);
            return;
        }
        if (parseInt(savedStart) !== currentStart) {
            // ماه جدید: پاک کردن سبد خرید فعلی ولی ذخیره تاریخچه سفارشات قبلی
            const oldCart = getCurrentMonthCart();
            if (oldCart.length > 0) {
                const history = getPastOrders();
                history.push({ monthStart: parseInt(savedStart), cart: oldCart, totalPrice: 0 }); // price later
                localStorage.setItem(MONTH_ORDERS_HISTORY, JSON.stringify(history));
            }
            localStorage.setItem(MONTH_CART_KEY, JSON.stringify([]));
            localStorage.setItem(MONTH_START_KEY, currentStart);
        }
    }

    function getCurrentMonthCart() {
        const raw = localStorage.getItem(MONTH_CART_KEY);
        return raw ? JSON.parse(raw) : [];
    }

    function saveCurrentMonthCart(cart) {
        localStorage.setItem(MONTH_CART_KEY, JSON.stringify(cart));
    }

    function getPastOrders() {
        const raw = localStorage.getItem(MONTH_ORDERS_HISTORY);
        return raw ? JSON.parse(raw) : [];
    }

    // اضافه کردن به سبد ماهانه (عدم تکرار)
    function addToMonthlyCart(designId) {
        let cart = getCurrentMonthCart();
        if (!cart.includes(designId)) {
            cart.push(designId);
            saveCurrentMonthCart(cart);
        }
        renderUI();
    }

    function removeFromMonthlyCart(designId) {
        let cart = getCurrentMonthCart();
        cart = cart.filter(id => id !== designId);
        saveCurrentMonthCart(cart);
        renderUI();
    }

    // محاسبه تخفیف ماهانه بر اساس تعداد طرح
    function getMonthlyDiscount(cartLength) {
        if (cartLength >= 10) return 70;
        if (cartLength >= 8) return 60;
        if (cartLength >= 4) return 50;
        return 0;
    }

    function calculateTotal(cartIds) {
        let original = 0;
        cartIds.forEach(id => {
            const d = designsDB.find(dd => dd.id === id);
            if (d) original += d.price;
        });
        const discount = getMonthlyDiscount(cartIds.length);
        const final = original * (1 - discount / 100);
        return { original, final, discount };
    }

    // ثبت سفارش نهایی برای این ماه
    function finalizeMonthlyOrder() {
        const cart = getCurrentMonthCart();
        if (cart.length === 0) {
            alert(langPack[currentLang].emptyCart);
            return;
        }
        const { original, final, discount } = calculateTotal(cart);
        // ذخیره در تاریخچه
        const history = getPastOrders();
        const monthStart = localStorage.getItem(MONTH_START_KEY);
        history.push({ monthStart: parseInt(monthStart), cart: [...cart], originalTotal: original, finalTotal: final, discountPercent: discount });
        localStorage.setItem(MONTH_ORDERS_HISTORY, JSON.stringify(history));
        // خالی کردن سبد فعلی
        saveCurrentMonthCart([]);
        alert(langPack[currentLang].orderSuccess + `\n${langPack[currentLang].finalPay}: ${Math.floor(final).toLocaleString()} تومان`);
        renderUI();
    }

    // -------------------- متغیرهای زبان (فارسی/انگلیسی) --------------------
    let currentLang = "fa";
    const langPack = {
        fa: {
            siteTitle: "🎨 بازارچه طراحی چاپ (فلکسو، لیبل و بسته‌بندی)",
            cartTitle: "🛒 سبد خرید این ماه",
            designsTitle: "📦 طرح‌های موجود برای خرید (مخصوص چاپخانه‌ها)",
            emptyCart: "سبد خرید ماه جاری خالی است.",
            orderSuccess: "سفارش ماهانه با موفقیت ثبت شد. فایل‌ها قابل دانلود است.",
            finalPay: "مبلغ قابل پرداخت",
            addBtn: "➕ افزودن به سبد این ماه",
            addedBtn: "✓ اضافه شد",
            removeTxt: "حذف",
            monthInfo: "ماه جاری از",
            to: "تا",
            discountText: "🎁 تخفیف این ماه",
            totalAfter: "💰 جمع پس از تخفیف",
            originalPrice: "قیمت اصلی",
            checkoutNote: "* پس از ثبت، سبد این ماه بسته می‌شود و ماه بعد از صفر شروع می‌شود.",
            footer: "تخفیف ماهانه: خرید ۴ طرح = ۵۰٪ | ۸ طرح = ۶۰٪ | ۱۰+ طرح = ۷۰٪ — اعتبار فقط برای ماه جاری"
        },
        en: {
            siteTitle: "🎨 Print Design Marketplace (Flexo, Label & Packaging)",
            cartTitle: "🛒 This Month's Cart",
            designsTitle: "📦 Available Designs (for Printers)",
            emptyCart: "This month's cart is empty.",
            orderSuccess: "Monthly order placed. Files can be downloaded.",
            finalPay: "Amount to pay",
            addBtn: "➕ Add to this month",
            addedBtn: "✓ Added",
            removeTxt: "Remove",
            monthInfo: "Current month from",
            to: "to",
            discountText: "🎁 This month discount",
            totalAfter: "💰 Total after discount",
            originalPrice: "Original price",
            checkoutNote: "* After checkout, this month's cart resets next month.",
            footer: "Monthly discount: 4 designs = 50% | 8 designs = 60% | 10+ designs = 70% — valid only for current month"
        }
    };

    function applyLanguage() {
        document.getElementById("siteTitle").innerText = langPack[currentLang].siteTitle;
        document.getElementById("cartTitle").innerText = langPack[currentLang].cartTitle;
        document.getElementById("designsTitle").innerText = langPack[currentLang].designsTitle;
        document.getElementById("checkoutNote").innerText = langPack[currentLang].checkoutNote;
        document.getElementById("footerText").innerText = langPack[currentLang].footer;
        const checkoutBtn = document.getElementById("checkoutFinalBtn");
        if (checkoutBtn) checkoutBtn.innerText = currentLang === "fa" ? "✅ ثبت سفارش ماهانه (پرداخت و دریافت فایل‌ها)" : "✅ Finalize Monthly Order";
        renderUI();
    }

    // رندر کامل
    function renderUI() {
        resetMonthIfNeeded();
        const cart = getCurrentMonthCart();
        const monthStartTs = localStorage.getItem(MONTH_START_KEY);
        const startDate = new Date(parseInt(monthStartTs));
        const endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0);
        const monthStr = `${startDate.toLocaleDateString('fa-IR')} ${langPack[currentLang].to} ${endDate.toLocaleDateString('fa-IR')}`;
        document.getElementById("monthRangeDisplay").innerHTML = `📅 ${langPack[currentLang].monthInfo} ${monthStr}`;

        // نمایش آیتم‌های سبد
        const cartContainer = document.getElementById("cartItemsList");
        if (cart.length === 0) {
            cartContainer.innerHTML = `<p>${langPack[currentLang].emptyCart}</p>`;
        } else {
            let html = "";
            cart.forEach(id => {
                const d = designsDB.find(x => x.id === id);
                if (d) {
                    const name = currentLang === "fa" ? d.nameFa : d.nameEn;
                    const type = currentLang === "fa" ? d.typeFa : d.typeEn;
                    html += `<div class="cart-item">
                        <span><strong>${name}</strong> (${type}) - ${d.price.toLocaleString()} تومان</span>
                        <button class="remove-cart-item" data-id="${d.id}" style="background:#ef4444; border:none; color:white; padding:4px 16px; border-radius:30px;">${langPack[currentLang].removeTxt}</button>
                    </div>`;
                }
            });
            cartContainer.innerHTML = html;
            document.querySelectorAll(".remove-cart-item").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.getAttribute("data-id"));
                    removeFromMonthlyCart(id);
                });
            });
        }

        const { original, final, discount } = calculateTotal(cart);
        document.getElementById("discountBox").innerHTML = `${langPack[currentLang].discountText}: ${discount}% (${cart.length} طرح)`;
        document.getElementById("totalPriceDisplay").innerHTML = `${langPack[currentLang].totalAfter}: ${Math.floor(final).toLocaleString()} تومان<br><span style="font-size:14px;">${langPack[currentLang].originalPrice}: ${original.toLocaleString()} تومان</span>`;

        // رندر گرید طرح‌ها
        const grid = document.getElementById("designsGrid");
        let gridHtml = "";
        designsDB.forEach(d => {
            const isAdded = cart.includes(d.id);
            const name = currentLang === "fa" ? d.nameFa : d.nameEn;
            const type = currentLang === "fa" ? d.typeFa : d.typeEn;
            gridHtml += `
                <div class="design-card">
                    <h3>${name}</h3>
                    <p>${type}</p>
                    <div class="price-tag">${d.price.toLocaleString()} تومان</div>
                    ${!isAdded ? `<button class="add-design" data-id="${d.id}">${langPack[currentLang].addBtn}</button>` : `<button disabled>${langPack[currentLang].addedBtn}</button>`}
                </div>
            `;
        });
        grid.innerHTML = gridHtml;
        document.querySelectorAll(".add-design").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                addToMonthlyCart(id);
            });
        });
    }

    // راه‌اندازی
    document.addEventListener("DOMContentLoaded", () => {
        resetMonthIfNeeded();
        renderUI();
        document.getElementById("langFa").addEventListener("click", () => {
            currentLang = "fa";
            document.getElementById("langFa").classList.add("active-lang");
            document.getElementById("langEn").classList.remove("active-lang");
            applyLanguage();
        });
        document.getElementById("langEn").addEventListener("click", () => {
            currentLang = "en";
            document.getElementById("langEn").classList.add("active-lang");
            document.getElementById("langFa").classList.remove("active-lang");
            applyLanguage();
        });
        document.getElementById("checkoutFinalBtn").addEventListener("click", finalizeMonthlyOrder);
    });
</script>
</body>
</html>
